<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Voice Quest — 멀티플레이 MVP</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0b0e1a; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
  canvas { display:block; touch-action:none; }
  .hud { position:absolute; z-index:10; color:#fff; }
  #topbar { top:0; left:0; right:0; padding:10px 14px; display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none; }
  .panel { background:rgba(10,14,30,.72); border:1px solid rgba(120,150,255,.25); border-radius:12px; padding:8px 12px; backdrop-filter:blur(6px); }
  .bar { height:8px; border-radius:4px; background:#222a44; overflow:hidden; width:140px; margin-top:4px; }
  .bar>div { height:100%; border-radius:4px; transition:width .3s; }
  #hpfill { background:linear-gradient(90deg,#ff5f6d,#ff8f70); width:100%; }
  .label { font-size:11px; opacity:.85; letter-spacing:.5px; }
  #chatlog { position:absolute; left:10px; bottom:96px; width:min(62vw,340px); max-height:170px; overflow-y:auto; z-index:10;
    display:flex; flex-direction:column; gap:4px; pointer-events:none; }
  .msg { font-size:12.5px; color:#e8ecff; background:rgba(10,14,30,.66); border-radius:10px; padding:5px 10px; width:fit-content; max-width:100%; line-height:1.45; }
  .msg .who { font-weight:700; margin-right:5px; }
  .msg.me .who { color:#7fd4ff; } .msg.other .who { color:#ffd47f; } .msg.sys { color:#9aa4c7; font-style:italic; }
  #micbtn { position:absolute; right:18px; bottom:22px; z-index:12; width:76px; height:76px; border-radius:50%;
    border:3px solid rgba(255,255,255,.35); background:radial-gradient(circle at 35% 30%,#5a7dff,#2b3fae);
    color:#fff; font-size:30px; box-shadow:0 6px 22px rgba(40,70,255,.45); cursor:pointer; user-select:none; }
  #micbtn.on { background:radial-gradient(circle at 35% 30%,#ff6b6b,#b3123f); animation:pulse 1.1s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  #miclabel { position:absolute; right:14px; bottom:4px; z-index:12; color:#aab6e8; font-size:10.5px; width:84px; text-align:center; }
  #atkbtn { position:absolute; right:110px; bottom:34px; z-index:12; width:56px; height:56px; border-radius:50%;
    border:2px solid rgba(255,255,255,.3); background:radial-gradient(circle at 35% 30%,#ffb75e,#d5541f); color:#fff; font-size:22px; cursor:pointer; user-select:none; }
  #testbtn { position:absolute; left:12px; bottom:26px; z-index:12; border:1px solid rgba(255,255,255,.25);
    background:rgba(10,14,30,.7); color:#cdd6ff; border-radius:10px; padding:8px 12px; font-size:12px; cursor:pointer; }
  #hint { position:absolute; left:50%; transform:translateX(-50%); bottom:6px; z-index:10; color:#7c88b8; font-size:11px; text-align:center; width:92%; pointer-events:none; }
  #interim { position:absolute; left:50%; transform:translateX(-50%); bottom:110px; z-index:11; color:#fff;
    background:rgba(70,90,220,.55); border-radius:14px; padding:6px 14px; font-size:14px; display:none; max-width:80vw; }
  .bubble { position:absolute; z-index:9; transform:translate(-50%,-100%); background:rgba(255,255,255,.94); color:#1a2040;
    border-radius:12px; padding:6px 12px; font-size:13px; max-width:220px; display:none; pointer-events:none; line-height:1.4; }
  .bubble::after { content:''; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%);
    border:7px solid transparent; border-top-color:rgba(255,255,255,.94); border-bottom:none; }
  .bubble.confused { background:rgba(255,240,180,.96); font-weight:700; }
  .bubble.confused::after { border-top-color:rgba(255,240,180,.96); }
  /* 로비 */
  #lobby { position:absolute; inset:0; z-index:50; background:rgba(6,9,20,.88); display:flex; align-items:center; justify-content:center; }
  #lobbybox { width:min(90vw,380px); background:rgba(16,22,44,.95); border:1px solid rgba(120,150,255,.35);
    border-radius:18px; padding:26px 24px; color:#fff; text-align:center; }
  #lobbybox h1 { font-size:20px; margin-bottom:4px; }
  #lobbybox p { font-size:12px; color:#9aa4c7; margin-bottom:16px; }
  #lobbybox input { width:100%; padding:11px 12px; border-radius:10px; border:1px solid rgba(120,150,255,.35);
    background:#0d1226; color:#fff; font-size:14px; margin-bottom:10px; text-align:center; }
  .lbtn { width:100%; padding:12px; border:none; border-radius:10px; font-size:14px; font-weight:700;
    cursor:pointer; margin-top:8px; color:#fff; }
  #mkroom { background:linear-gradient(90deg,#4a6cf7,#7a4af7); }
  #joinroom { background:linear-gradient(90deg,#2fa36b,#2f8fa3); }
  #solobtn { background:#333d5e; }
  #roomcode { font-size:34px; font-weight:800; letter-spacing:6px; color:#ffd94a; margin:10px 0; display:none; }
  #lobbymsg { font-size:12px; color:#8fd4ff; min-height:16px; margin-top:8px; }
  #playerspanel { display:none; }
</style>
</head>
<body>
<div id="lobby">
  <div id="lobbybox">
    <h1>🗡️ Voice Quest</h1>
    <p>음성으로 조종하고, 음성이 채팅이 되는 무협 세계</p>
    <input id="nameinput" maxlength="8" placeholder="닉네임 (예: 비광)">
    <button class="lbtn" id="mkroom">🏠 방 만들기 (코드 생성)</button>
    <input id="codeinput" maxlength="4" placeholder="참가 코드 4자리" style="margin-top:14px">
    <button class="lbtn" id="joinroom">🚪 코드로 참가</button>
    <button class="lbtn" id="solobtn">🌙 혼자 수련하기</button>
    <div id="roomcode"></div>
    <div id="lobbymsg"></div>
  </div>
</div>

<div id="topbar" class="hud">
  <div class="panel">
    <div class="label">🗡️ <span id="myname">나</span></div>
    <div class="bar"><div id="hpfill"></div></div>
  </div>
  <div class="panel" style="text-align:right">
    <div class="label">⚔️ 처치 <b id="kills" style="font-size:16px">0</b> · 👥 접속 <b id="pcount" style="font-size:16px">1</b></div>
  </div>
</div>
<div id="chatlog" class="hud"></div>
<div id="pbub" class="bubble"></div>
<div id="interim"></div>
<button id="micbtn">🎤</button>
<div id="miclabel">누르면 듣기 시작</div>
<button id="atkbtn">⚔️</button>
<button id="testbtn">😕 제스처 테스트</button>
<div id="hint">땅 터치 = 이동 · 🎤 명령("공격해","멈춰")과 채팅이 모두 음성으로 · 친구에게 방 코드를 알려주세요</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
<script>
"use strict";
/* ================= 기본 셋업 ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x101a2b);
scene.fog = new THREE.Fog(0x101a2b, 28, 85);
const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, .1, 200);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

scene.add(new THREE.HemisphereLight(0xcfe0ff, 0x2a3d2a, .8));
const sun = new THREE.DirectionalLight(0xffe9c0, 1.1);
sun.position.set(12,20,8); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-18; sun.shadow.camera.right=18;
sun.shadow.camera.top=18; sun.shadow.camera.bottom=-18; sun.shadow.camera.far=60;
scene.add(sun); scene.add(sun.target);

const rand=(a,b)=>a+Math.random()*(b-a);
const lerpAngle=(a,b,t)=>{ let d=b-a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2; return a+d*t; };
const M=c=>new THREE.MeshLambertMaterial({color:c});

/* ================= 지형 ================= */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(300,300), M(0x2c5e38));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
for(let i=0;i<120;i++){
  const p=new THREE.Mesh(new THREE.CircleGeometry(rand(.6,2.4),10), M(Math.random()<.5?0x275434:0x336b40));
  p.rotation.x=-Math.PI/2; p.position.set(rand(-90,90),.01,rand(-90,90)); scene.add(p);
}
for(let i=0;i<55;i++){
  const g=new THREE.Group();
  const h=rand(2.4,4.6);
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.14,.2,h*.45,8), M(0x5b4023));
  trunk.position.y=h*.22; trunk.castShadow=true; g.add(trunk);
  const leaf=new THREE.Mesh(new THREE.ConeGeometry(h*.33,h*.75,9), M(Math.random()<.5?0x2f6b3a:0x3d8a4b));
  leaf.position.y=h*.45+h*.36; leaf.castShadow=true; g.add(leaf);
  let x,z; do{ x=rand(-90,90); z=rand(-90,90); }while(Math.hypot(x,z)<8);
  g.position.set(x,0,z); scene.add(g);
}
for(let i=0;i<26;i++){
  const g=new THREE.Group();
  const h=rand(3.5,5.5);
  const stalk=new THREE.Mesh(new THREE.CylinderGeometry(.06,.08,h,6), M(0x6fa84e));
  stalk.position.y=h/2; stalk.castShadow=true; g.add(stalk);
  for(let k=0;k<3;k++){
    const lf=new THREE.Mesh(new THREE.ConeGeometry(.16,.7,5), M(0x8fc45e));
    lf.position.set(rand(-.2,.2), h*rand(.6,.95), rand(-.2,.2));
    lf.rotation.z=rand(-1,1); g.add(lf);
  }
  let x,z; do{ x=rand(-80,80); z=rand(-80,80); }while(Math.hypot(x,z)<7);
  g.position.set(x,0,z); scene.add(g);
}
function blobShadow(r){
  const m=new THREE.Mesh(new THREE.CircleGeometry(r,16),
    new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.22}));
  m.rotation.x=-Math.PI/2; m.position.y=.02; return m;
}

/* ================= 무협 캐릭터 (인체 개선판) ================= */
function makeHero(robeColor){
  const SKIN=0xf5cfa4, ROBE=robeColor||0x2f5fc4, TRIM=0xe9edf7, SASH=0x1c2340,
        PANTS=0x27304f, HAIR=0x171a22, BAND=0xd42a2a;
  const g=new THREE.Group();

  /* 다리: 더 길고 곧게 */
  function leg(x){
    const pivot=new THREE.Group(); pivot.position.set(x,.72,0);
    const thigh=new THREE.Mesh(new THREE.CylinderGeometry(.1,.11,.42,8), M(PANTS));
    thigh.position.y=-.2; thigh.castShadow=true; pivot.add(thigh);
    const calf=new THREE.Mesh(new THREE.CylinderGeometry(.085,.07,.34,8), M(PANTS));
    calf.position.y=-.55; pivot.add(calf);
    const shoe=new THREE.Mesh(new THREE.SphereGeometry(.095,8,8), M(0x14161c));
    shoe.position.set(0,-.72,.05); shoe.scale.set(.9,.5,1.5); pivot.add(shoe);
    g.add(pivot); return pivot;
  }
  const legL=leg(-.15), legR=leg(.15);

  /* 도포 자락 */
  const skirt=new THREE.Mesh(new THREE.CylinderGeometry(.34,.5,.6,12,1,true), M(ROBE));
  skirt.position.y=.9; skirt.castShadow=true; g.add(skirt);
  const skirtTrim=new THREE.Mesh(new THREE.CylinderGeometry(.495,.515,.08,12,1,true), M(TRIM));
  skirtTrim.position.y=.64; g.add(skirtTrim);

  /* 상체: 어깨가 넓고 허리가 좁은 실루엣 */
  const waist=new THREE.Mesh(new THREE.CylinderGeometry(.24,.3,.35,12), M(ROBE));
  waist.position.y=1.32; g.add(waist);
  const chest=new THREE.Mesh(new THREE.CylinderGeometry(.32,.24,.55,12), M(ROBE));
  chest.position.y=1.75; chest.castShadow=true; g.add(chest);
  // 어깨
  for(const sx of [-.32,.32]){
    const sh=new THREE.Mesh(new THREE.SphereGeometry(.13,10,10), M(ROBE));
    sh.position.set(sx,1.98,0); g.add(sh);
  }
  // 앞섶 흰 깃 (V자)
  const collarL=new THREE.Mesh(new THREE.BoxGeometry(.08,.46,.03), M(TRIM));
  collarL.position.set(-.09,1.85,.26); collarL.rotation.z=.32; g.add(collarL);
  const collarR=collarL.clone(); collarR.position.x=.09; collarR.rotation.z=-.32; g.add(collarR);
  /* 허리띠 */
  const sash=new THREE.Mesh(new THREE.CylinderGeometry(.305,.32,.13,12), M(SASH));
  sash.position.y=1.18; g.add(sash);
  const knot=new THREE.Mesh(new THREE.SphereGeometry(.08,8,8), M(SASH));
  knot.position.set(.22,1.18,.24); g.add(knot);

  /* 팔: 어깨→소매→손목→손 */
  function arm(x){
    const pivot=new THREE.Group(); pivot.position.set(x,1.96,0);
    const upper=new THREE.Mesh(new THREE.CylinderGeometry(.085,.1,.36,8), M(ROBE));
    upper.position.y=-.18; upper.castShadow=true; pivot.add(upper);
    const sleeve=new THREE.Mesh(new THREE.CylinderGeometry(.1,.15,.34,8), M(ROBE));
    sleeve.position.y=-.5; pivot.add(sleeve);
    const cuff=new THREE.Mesh(new THREE.CylinderGeometry(.15,.155,.06,8), M(TRIM));
    cuff.position.y=-.67; pivot.add(cuff);
    const hand=new THREE.Mesh(new THREE.SphereGeometry(.075,8,8), M(SKIN));
    hand.position.y=-.76; hand.scale.set(.85,1.15,.6); pivot.add(hand);
    g.add(pivot); return pivot;
  }
  const armL=arm(-.36), armR=arm(.36);

  /* 목 */
  const neck=new THREE.Mesh(new THREE.CylinderGeometry(.09,.11,.14,8), M(SKIN));
  neck.position.y=2.08; g.add(neck);

  /* 머리: 갸름한 얼굴 + 코 + 입 + 귀 */
  const head=new THREE.Group(); head.position.y=2.36; g.add(head);
  const face=new THREE.Mesh(new THREE.SphereGeometry(.26,18,14), M(SKIN));
  face.scale.set(.92,1.08,.95); face.castShadow=true; head.add(face);
  // 눈
  for(const sx of [-.1,.1]){
    const white=new THREE.Mesh(new THREE.SphereGeometry(.05,8,8), M(0xffffff));
    white.position.set(sx,.02,.22); white.scale.set(1,1.25,.45); head.add(white);
    const iris=new THREE.Mesh(new THREE.SphereGeometry(.026,8,8), M(0x1a1a1a));
    iris.position.set(sx,.02,.245); head.add(iris);
  }
  // 눈썹
  for(const sx of [-.1,.1]){
    const brow=new THREE.Mesh(new THREE.BoxGeometry(.1,.022,.02), M(HAIR));
    brow.position.set(sx,.11,.235); brow.rotation.z=sx<0?-.18:.18; head.add(brow);
  }
  // 코
  const nose=new THREE.Mesh(new THREE.ConeGeometry(.03,.09,6), M(0xeec090));
  nose.position.set(0,-.045,.26); nose.rotation.x=Math.PI/2.2; head.add(nose);
  // 입
  const mouth=new THREE.Mesh(new THREE.BoxGeometry(.09,.018,.015), M(0xb35b4a));
  mouth.position.set(0,-.13,.23); head.add(mouth);
  // 귀
  for(const sx of [-.24,.24]){
    const ear=new THREE.Mesh(new THREE.SphereGeometry(.05,8,8), M(SKIN));
    ear.position.set(sx,-.01,.02); ear.scale.set(.5,1,.7); head.add(ear);
  }
  // 뒷머리
  const hairBack=new THREE.Mesh(new THREE.SphereGeometry(.275,16,12), M(HAIR));
  hairBack.position.set(0,.06,-.06); hairBack.scale.set(.98,1,.92); head.add(hairBack);
  // 뻗친 머리
  for(let i=0;i<9;i++){
    const s=new THREE.Mesh(new THREE.ConeGeometry(.075,rand(.24,.36),6), M(HAIR));
    const a=(i/9)*Math.PI*2;
    s.position.set(Math.cos(a)*.14, .26, Math.sin(a)*.12-.03);
    s.rotation.x=Math.sin(a)*.5-.15; s.rotation.z=-Math.cos(a)*.5;
    head.add(s);
  }
  const topSpike=new THREE.Mesh(new THREE.ConeGeometry(.09,.38,6), M(HAIR));
  topSpike.position.set(0,.32,0); head.add(topSpike);
  // 붉은 두건
  const band=new THREE.Mesh(new THREE.CylinderGeometry(.27,.27,.09,16,1,true), M(BAND));
  band.position.y=.1; head.add(band);
  const ribbons=[];
  for(const sx of [-.06,.06]){
    const pivot=new THREE.Group(); pivot.position.set(sx,.08,-.26); head.add(pivot);
    const rb=new THREE.Mesh(new THREE.BoxGeometry(.055,.5,.02), M(BAND));
    rb.position.y=-.25; pivot.add(rb);
    ribbons.push(pivot);
  }
  /* 등의 검 */
  const sword=new THREE.Group();
  const scab=new THREE.Mesh(new THREE.BoxGeometry(.06,1.1,.04), M(0x20263c));
  scab.position.y=-.1; sword.add(scab);
  const grip=new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.26,8), M(0x7a2020));
  grip.position.y=.56; sword.add(grip);
  const guard=new THREE.Mesh(new THREE.CylinderGeometry(.08,.08,.028,10), M(0xc9a227));
  guard.position.y=.42; sword.add(guard);
  sword.position.set(.1,1.75,-.3); sword.rotation.z=.5; sword.rotation.x=.08; g.add(sword);

  g.add(blobShadow(.48));
  g.scale.setScalar(.88);
  return { root:g, head, armL, armR, legL, legR, skirt, ribbons };
}

/* 공용 애니메이터 */
function animateHero(v, walking, time, shrugK, slashT){
  v.ribbons.forEach((r,i)=>{ r.rotation.x=.35+Math.sin(time*2.2+i*1.7)*.22 + (walking?.25:0); });
  if(shrugK>0){
    v.armL.rotation.z =  2.3*shrugK; v.armR.rotation.z = -2.3*shrugK;
    v.armL.rotation.x = v.armR.rotation.x = 0;
    v.legL.rotation.x = v.legR.rotation.x = 0;
    v.head.rotation.z = Math.sin(time*3)*.2*shrugK;
    return;
  }
  v.head.rotation.z*=.9;
  v.armL.rotation.z*=.8; v.armR.rotation.z*=.8;
  if(slashT>0) v.armR.rotation.x = -2.2 + (14-slashT)*.16;
  if(walking){
    const s=Math.sin(time*9.5);
    v.armL.rotation.x= s*.6; if(!(slashT>0)) v.armR.rotation.x=-s*.6;
    v.legL.rotation.x=-s*.7; v.legR.rotation.x= s*.7;
    v.skirt.rotation.x = Math.abs(s)*.05;
    v.root.position.y = Math.abs(Math.sin(time*9.5))*.05;
  }else{
    v.armL.rotation.x*=.85; if(!(slashT>0)) v.armR.rotation.x*=.85;
    v.legL.rotation.x*=.85; v.legR.rotation.x*=.85;
    v.skirt.rotation.x*=.85;
    v.root.position.y = Math.sin(time*1.8)*.02;
  }
}

/* 이름표 */
function nameSprite(name,color){
  const c=document.createElement('canvas'); c.width=256; c.height=64;
  const x=c.getContext('2d');
  x.font='bold 34px sans-serif'; x.textAlign='center'; x.textBaseline='middle';
  x.strokeStyle='rgba(0,0,0,.7)'; x.lineWidth=7; x.strokeText(name,128,32);
  x.fillStyle=color||'#fff'; x.fillText(name,128,32);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));
  s.scale.set(1.7,.42,1); return s;
}

/* ================= 내 캐릭터 ================= */
let myName='무명객';
const player={ group:new THREE.Group(), yaw:0, walking:false, tx:0, tz:0, speed:.075, atkCd:0 };
player.visual=makeHero(0x2f5fc4);
player.group.add(player.visual.root);
scene.add(player.group);
let myTag=null;

function makeQSprite(){
  const c=document.createElement('canvas'); c.width=c.height=128;
  const x=c.getContext('2d');
  x.font='bold 96px sans-serif'; x.textAlign='center'; x.textBaseline='middle';
  x.strokeStyle='rgba(0,0,0,.5)'; x.lineWidth=10; x.strokeText('?',64,70);
  x.fillStyle='#ffd94a'; x.fillText('?',64,70);
  const s=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),transparent:true}));
  s.scale.set(.8,.8,1); s.visible=false; return s;
}
const qmark=makeQSprite(); qmark.position.y=2.8; player.group.add(qmark);

/* ================= 몹 ================= */
let mobs=[], kills=0;
function makeMobVisual(){
  const g=new THREE.Group();
  const hue=rand(.25,.4);
  const body=new THREE.Mesh(new THREE.SphereGeometry(.45,14,12),
    new THREE.MeshLambertMaterial({color:new THREE.Color().setHSL(hue,.55,.45)}));
  body.scale.y=.85; body.position.y=.42; body.castShadow=true; g.add(body);
  for(const sx of [-.16,.16]){
    const w=new THREE.Mesh(new THREE.SphereGeometry(.1,8,8), M(0xffffff)); w.position.set(sx,.52,.38); g.add(w);
    const b=new THREE.Mesh(new THREE.SphereGeometry(.05,8,8), M(0x111111)); b.position.set(sx,.52,.46); g.add(b);
  }
  g.add(blobShadow(.42));
  scene.add(g);
  return {group:g, body};
}
function spawnMob(){
  const v=makeMobVisual();
  const ang=rand(0,Math.PI*2), d=rand(10,20);
  const px=player.group.position;
  v.group.position.set(px.x+Math.cos(ang)*d, 0, px.z+Math.sin(ang)*d);
  mobs.push({ ...v, hp:40, speed:.032, atkCd:0, wob:rand(0,9) });
}

/* ================= 멀티플레이 (PeerJS P2P) ================= */
const NET={ mode:'solo', peer:null, conns:{}, states:{}, names:{} };
const remotes={}; // id -> {group, visual, tag, bubbleEl, bubbleT, tx,tz,yaw,walking,shrugT,time0}
function colorFromId(id){
  let h=0; for(let i=0;i<id.length;i++) h=(h*31+id.charCodeAt(i))>>>0;
  return new THREE.Color().setHSL((h%360)/360,.55,.42).getHex();
}
function ensureRemote(id,name){
  if(remotes[id]) return remotes[id];
  const group=new THREE.Group();
  const visual=makeHero(colorFromId(id));
  group.add(visual.root);
  const tag=nameSprite(name||'???','#ffd47f'); tag.position.y=2.75; group.add(tag);
  scene.add(group);
  const bubbleEl=document.createElement('div'); bubbleEl.className='bubble';
  document.body.appendChild(bubbleEl);
  remotes[id]={ group, visual, tag, bubbleEl, bubbleT:0, tx:0, tz:0, yaw:0, walking:false, shrugT:0, slashT:0 };
  updatePCount();
  return remotes[id];
}
function removeRemote(id){
  const r=remotes[id]; if(!r) return;
  scene.remove(r.group); r.bubbleEl.remove(); delete remotes[id];
  updatePCount();
}
function updatePCount(){
  document.getElementById('pcount').textContent = 1+Object.keys(remotes).length;
}
function hostBroadcast(msg,exceptId){
  for(const [id,c] of Object.entries(NET.conns)) if(id!==exceptId) try{ c.send(msg); }catch(_){}
}
function netSendChat(text){
  if(NET.mode==='host') hostBroadcast({t:'chat',id:'H',n:myName,text});
  else if(NET.mode==='guest'&&NET.hostConn) NET.hostConn.send({t:'chat',text});
}
function netSendHuh(){
  if(NET.mode==='host') hostBroadcast({t:'huh',id:'H'});
  else if(NET.mode==='guest'&&NET.hostConn) NET.hostConn.send({t:'huh'});
}
function showRemoteChat(id,name,text){
  const r=ensureRemote(id,name);
  addChat(name,text,'other');
  r.bubbleEl.textContent=text; r.bubbleEl.className='bubble'; r.bubbleT=240;
}
function showRemoteHuh(id){
  const r=remotes[id]; if(!r) return;
  r.shrugT=90;
  r.bubbleEl.textContent='뭐라고...? 🤔'; r.bubbleEl.className='bubble confused'; r.bubbleT=90;
}

/* --- 호스트 --- */
function startHost(){
  const code=(''+Math.floor(1000+Math.random()*9000));
  setLobbyMsg('방 생성 중…');
  const peer=new Peer('vqkr-'+code);
  NET.peer=peer;
  peer.on('open',()=>{
    NET.mode='host';
    document.getElementById('roomcode').style.display='block';
    document.getElementById('roomcode').textContent=code;
    setLobbyMsg('친구에게 이 코드를 알려주세요! 잠시 후 입장합니다…');
    setTimeout(closeLobby,2200);
    addChat('','🏠 방이 열렸습니다. 코드: <b>'+code+'</b>','sys');
  });
  peer.on('connection',conn=>{
    conn.on('open',()=>{ NET.conns[conn.peer]=conn; });
    conn.on('data',d=>onHostData(conn,d));
    conn.on('close',()=>{ delete NET.conns[conn.peer]; delete NET.states[conn.peer];
      addChat('',(NET.names[conn.peer]||'누군가')+' 님이 떠났습니다.','sys'); removeRemote(conn.peer); });
  });
  peer.on('error',e=>setLobbyMsg('⚠️ 연결 오류: '+e.type+' — 다시 시도하거나 혼자 수련하기를 눌러주세요'));
  // 상태 브로드캐스트 (10Hz)
  setInterval(()=>{
    if(NET.mode!=='host') return;
    const p=player.group.position;
    const ps=[{id:'H',n:myName,x:+p.x.toFixed(2),z:+p.z.toFixed(2),yaw:+player.yaw.toFixed(2),w:player.walking?1:0}];
    for(const [id,s] of Object.entries(NET.states))
      ps.push({id,n:NET.names[id]||'???',x:s.x,z:s.z,yaw:s.yaw,w:s.w});
    hostBroadcast({t:'snap',ps,mobs:mobs.map(m=>[+m.group.position.x.toFixed(2),+m.group.position.z.toFixed(2)]),k:kills});
  },100);
}
function onHostData(conn,d){
  const id=conn.peer;
  if(d.t==='hello'){ NET.names[id]=d.name; ensureRemote(id,d.name);
    addChat('','⚡ '+d.name+' 님이 입장했습니다!','sys'); }
  else if(d.t==='me'){ NET.states[id]=d;
    const r=ensureRemote(id,NET.names[id]); r.tx=d.x; r.tz=d.z; r.yaw=d.yaw; r.walking=!!d.w; }
  else if(d.t==='chat'){ showRemoteChat(id,NET.names[id]||'???',d.text);
    hostBroadcast({t:'chat',id,n:NET.names[id]||'???',text:d.text},id); }
  else if(d.t==='huh'){ showRemoteHuh(id); hostBroadcast({t:'huh',id},id); }
}
/* --- 게스트 --- */
function startGuest(code){
  setLobbyMsg('접속 중…');
  const peer=new Peer();
  NET.peer=peer;
  peer.on('open',()=>{
    const conn=peer.connect('vqkr-'+code,{reliable:true});
    NET.hostConn=conn;
    conn.on('open',()=>{
      NET.mode='guest';
      conn.send({t:'hello',name:myName});
      setLobbyMsg('접속 완료!');
      setTimeout(closeLobby,600);
      addChat('','🚪 방 '+code+'에 입장했습니다.','sys');
      setInterval(()=>{
        const p=player.group.position;
        try{ conn.send({t:'me',x:+p.x.toFixed(2),z:+p.z.toFixed(2),yaw:+player.yaw.toFixed(2),w:player.walking?1:0}); }catch(_){}
      },100);
    });
    conn.on('data',d=>onGuestData(d));
    conn.on('close',()=>addChat('','⚠️ 호스트와 연결이 끊어졌습니다.','sys'));
  });
  peer.on('error',e=>setLobbyMsg('⚠️ 접속 실패: 코드를 확인해주세요 ('+e.type+')'));
}
let guestMobs=[];
function onGuestData(d){
  if(d.t==='snap'){
    const seen={};
    for(const q of d.ps){
      if(NET.peer && q.id!=='H' && q.id===NET.peer.id) continue; // 나 자신
      seen[q.id]=1;
      const r=ensureRemote(q.id,q.n);
      r.tx=q.x; r.tz=q.z; r.yaw=q.yaw; r.walking=!!q.w;
      if(r.tag && q.n && r.lastName!==q.n){ r.lastName=q.n; }
    }
    for(const id of Object.keys(remotes)) if(!seen[id]) removeRemote(id);
    // 몹 동기화
    while(guestMobs.length<d.mobs.length) guestMobs.push(makeMobVisual());
    while(guestMobs.length>d.mobs.length){ const v=guestMobs.pop(); scene.remove(v.group); }
    guestMobs.forEach((v,i)=>{ v.tx=d.mobs[i][0]; v.tz=d.mobs[i][1]; });
    kills=d.k; document.getElementById('kills').textContent=kills;
  }
  else if(d.t==='chat') showRemoteChat(d.id,d.n,d.text);
  else if(d.t==='huh') showRemoteHuh(d.id);
}

/* ================= 명령 파싱 ================= */
const COMMANDISH=/(해줘|해봐|해라|하라|하자|가자|해|줘|봐|라|자|춰|쳐|어라|아라)\s*[.!?]*$/;
function handleUtterance(text, conf){
  const t=text.trim(); if(!t) return;
  if(conf!==undefined && conf>0 && conf<0.5){ confuse('nohear'); return; }
  if(t.replace(/[\s.!?~]/g,'').length<=1){ confuse('nohear'); return; }
  const has=(...ws)=>ws.some(w=>t.includes(w));
  if(has('공격','싸워','잡아','쳐','때려','베어')){ sayMe(t); netSendChat(t); commandAttack(); return; }
  if(has('멈춰','정지','스탑','그만')){ const p=player.group.position; player.tx=p.x; player.tz=p.z; sayMe(t); netSendChat(t); return; }
  if(has('앞으로','전진')){ sayMe(t); netSendChat(t); moveForward(6); return; }
  if(has('뒤로','후진')){ sayMe(t); netSendChat(t); moveForward(-6); return; }
  if(has('왼쪽')){ sayMe(t); netSendChat(t); moveSide(-6); return; }
  if(has('오른쪽')){ sayMe(t); netSendChat(t); moveSide(6); return; }
  if(COMMANDISH.test(t) && t.length<=14){ confuse('unknown'); return; }
  sayMe(t); netSendChat(t); // 일반 대화 → 모두에게 전송
}
function moveForward(d){ player.tx=player.group.position.x+Math.sin(player.yaw)*d;
  player.tz=player.group.position.z+Math.cos(player.yaw)*d; }
function moveSide(d){ player.tx=player.group.position.x+Math.sin(player.yaw+Math.PI/2)*Math.sign(d)*Math.abs(d);
  player.tz=player.group.position.z+Math.cos(player.yaw+Math.PI/2)*Math.sign(d)*Math.abs(d); }
function activeMobs(){ return NET.mode==='guest' ? guestMobs : mobs; }
function nearestMobOf(list,pos){
  let best=null,bd=1e9;
  for(const m of list){ const d=m.group.position.distanceTo(pos); if(d<bd){bd=d;best=m;} }
  return best;
}
function commandAttack(){
  const m=nearestMobOf(activeMobs(),player.group.position);
  if(!m){ addChat('','주변에 몹이 없습니다.','sys'); return; }
  player.tx=m.group.position.x; player.tz=m.group.position.z;
}

/* ================= 음성 인식 ================= */
const micbtn=document.getElementById('micbtn'), miclabel=document.getElementById('miclabel'),
      interimEl=document.getElementById('interim');
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null, listening=false;
if(SR){
  rec=new SR(); rec.lang='ko-KR'; rec.continuous=true; rec.interimResults=true;
  rec.onresult=e=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const r=e.results[i];
      if(r.isFinal){ interimEl.style.display='none'; handleUtterance(r[0].transcript, r[0].confidence); }
      else interim+=r[0].transcript;
    }
    if(interim){ interimEl.textContent='🎤 '+interim; interimEl.style.display='block'; }
  };
  rec.onend=()=>{ if(listening) try{rec.start();}catch(_){} };
  rec.onerror=e=>{
    if(e.error==='not-allowed'){ addChat('','⚠️ 마이크 권한을 허용해주세요.','sys'); stopMic(); }
    else if(e.error==='no-speech'&&listening){ confuse('nohear'); }
  };
}else{
  addChat('','⚠️ 이 브라우저는 음성 인식을 지원하지 않아요. Chrome에서 열어주세요.','sys');
}
function startMic(){ if(!rec) return; listening=true; micbtn.classList.add('on');
  miclabel.textContent='듣는 중… 눌러서 끄기'; try{rec.start();}catch(_){}
  addChat('','🎙️ 음성 인식 시작 — 말해보세요!','sys'); }
function stopMic(){ listening=false; micbtn.classList.remove('on');
  miclabel.textContent='누르면 듣기 시작'; interimEl.style.display='none'; if(rec) try{rec.stop();}catch(_){} }

/* ================= 전투/이펙트 ================= */
const bursts=[];
function burst(pos,color){
  for(let i=0;i<10;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(rand(.04,.09),6,6),
      new THREE.MeshBasicMaterial({color}));
    p.position.copy(pos); p.position.y+=.5;
    scene.add(p);
    bursts.push({mesh:p,vx:rand(-.08,.08),vy:rand(.05,.16),vz:rand(-.08,.08),life:28});
  }
}
let slashT=0;
function damage(m,amt){
  m.hp-=amt;
  burst(m.group.position,0xffc44a);
  m.body.scale.set(1.25,.6,1.25); setTimeout(()=>m.body&&m.body.scale.set(1,.85,1),120);
  if(m.hp<=0){
    burst(m.group.position,0x8aff9a); burst(m.group.position,0xffffff);
    scene.remove(m.group); mobs=mobs.filter(z=>z!==m);
    kills++; document.getElementById('kills').textContent=kills;
  }
}
/* 모든 플레이어 위치 (호스트가 몹 AI/전투 판정에 사용) */
function allPlayerPos(){
  const arr=[{x:player.group.position.x,z:player.group.position.z,id:'H'}];
  for(const [id,r] of Object.entries(remotes))
    arr.push({x:r.group.position.x,z:r.group.position.z,id});
  return arr;
}
const atkCds={};

/* ================= 카메라/말풍선 ================= */
let camYaw=0;
function updateCamera(){
  const p=player.group.position;
  if(confusion<=0) camYaw=lerpAngle(camYaw,player.yaw,.05);
  const dist=4.8, h=2.8;
  camera.position.lerp(new THREE.Vector3(p.x-Math.sin(camYaw)*dist,h,p.z-Math.cos(camYaw)*dist),.12);
  camera.lookAt(new THREE.Vector3(p.x+Math.sin(camYaw)*2.2,1.5,p.z+Math.cos(camYaw)*2.2));
  sun.position.set(p.x+12,20,p.z+8);
  sun.target.position.set(p.x,0,p.z);
}
function placeBubble(el,t,obj,yOff){
  if(t<=0){ el.style.display='none'; return; }
  const v=obj.position.clone(); v.y+=yOff; v.project(camera);
  if(v.z>1){ el.style.display='none'; return; }
  el.style.display='block';
  el.style.left=((v.x*.5+.5)*innerWidth)+'px';
  el.style.top=((-v.y*.5+.5)*innerHeight-8)+'px';
}

/* ================= 메인 루프 ================= */
let hp=100, time=0;
const clock=new THREE.Clock();
function moveMe(){
  const p=player.group.position;
  const dx=player.tx-p.x, dz=player.tz-p.z, d=Math.hypot(dx,dz);
  player.walking=d>.25;
  if(player.walking){
    const ty=Math.atan2(dx,dz);
    player.yaw=lerpAngle(player.yaw,ty,.15);
    p.x+=Math.sin(player.yaw)*player.speed; p.z+=Math.cos(player.yaw)*player.speed;
  }
  player.group.rotation.y=player.yaw;
}
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  time+=dt;
  const ppos=player.group.position;

  /* 내 캐릭터 */
  let shrugK=0;
  if(confusion>0){
    confusion--;
    player.walking=false;
    if(confusion>35){
      const toCam=Math.atan2(camera.position.x-ppos.x, camera.position.z-ppos.z);
      player.yaw=lerpAngle(player.yaw,toCam,.2);
    }else{
      player.yaw=lerpAngle(player.yaw,preYaw,.15);
    }
    player.group.rotation.y=player.yaw;
    shrugK = confusion>130 ? (150-confusion)/20 : (confusion<40 ? Math.max(0,confusion-15)/25 : 1);
    qmark.visible = confusion>40;
    if(confusion===0){ qmark.visible=false; player.tx=ppos.x; player.tz=ppos.z; }
  }else{
    qmark.visible=false;
    moveMe();
  }
  if(slashT>0)slashT--;
  animateHero(player.visual, player.walking, time, shrugK, slashT);
  player.atkCd--;

  /* 원격 플레이어 보간 */
  for(const r of Object.values(remotes)){
    const p=r.group.position;
    p.x+=(r.tx-p.x)*.2; p.z+=(r.tz-p.z)*.2;
    r.group.rotation.y=lerpAngle(r.group.rotation.y,r.yaw,.2);
    if(r.shrugT>0)r.shrugT--;
    if(r.slashT>0)r.slashT--;
    animateHero(r.visual, r.walking, time+1.7, r.shrugT>0?1:0, r.slashT);
  }

  /* 전투 판정 (솔로/호스트) */
  if(NET.mode!=='guest'){
    // 각 플레이어 자동 공격
    for(const pp of allPlayerPos()){
      atkCds[pp.id]=(atkCds[pp.id]||0)-1;
      const m=nearestMobOf(mobs,new THREE.Vector3(pp.x,0,pp.z));
      if(m && Math.hypot(m.group.position.x-pp.x,m.group.position.z-pp.z)<1.9 && atkCds[pp.id]<=0){
        damage(m,12); atkCds[pp.id]=40;
        if(pp.id==='H') slashT=14; else if(remotes[pp.id]) remotes[pp.id].slashT=14;
      }
    }
    // 몹 AI: 가장 가까운 플레이어 추격
    for(const m of mobs){
      const mp=m.group.position;
      m.body.position.y=.42+Math.abs(Math.sin(time*4+m.wob))*.12;
      let tgt=null,td=1e9;
      for(const pp of allPlayerPos()){ const d=Math.hypot(mp.x-pp.x,mp.z-pp.z); if(d<td){td=d;tgt=pp;} }
      if(tgt&&td<9){
        const dx=tgt.x-mp.x, dz=tgt.z-mp.z;
        if(td>1.1){ mp.x+=dx/td*m.speed; mp.z+=dz/td*m.speed; }
        m.group.rotation.y=Math.atan2(dx,dz);
        m.atkCd--;
        if(td<1.4&&m.atkCd<=0&&tgt.id==='H'){
          hp=Math.max(0,hp-4); m.atkCd=70;
          document.getElementById('hpfill').style.width=hp+'%';
          if(hp<=0){ hp=100; document.getElementById('hpfill').style.width='100%';
            addChat('','💫 쓰러졌다… 내공으로 다시 일어났다!','sys'); }
        } else if(td<1.4&&m.atkCd<=0){ m.atkCd=70; }
      }else{
        m.wob+=.015;
        mp.x+=Math.cos(m.wob)*.008; mp.z+=Math.sin(m.wob*.7)*.008;
      }
    }
  }else{
    /* 게스트: 몹 위치 보간 + 내 체력만 로컬 판정 */
    for(const v of guestMobs){
      const mp=v.group.position;
      if(v.tx!==undefined){ mp.x+=(v.tx-mp.x)*.2; mp.z+=(v.tz-mp.z)*.2; }
      v.wob=(v.wob||0);
      const dp=Math.hypot(mp.x-ppos.x,mp.z-ppos.z);
      if(dp<1.9&&player.atkCd<=0){ slashT=14; burst(mp,0xffc44a); player.atkCd=40; }
      v.cd=(v.cd||0)-1;
      if(dp<1.4&&v.cd<=0){
        hp=Math.max(0,hp-4); v.cd=70;
        document.getElementById('hpfill').style.width=hp+'%';
        if(hp<=0){ hp=100; document.getElementById('hpfill').style.width='100%';
          addChat('','💫 쓰러졌다… 내공으로 다시 일어났다!','sys'); }
      }
    }
  }

  /* 이펙트 */
  for(let i=bursts.length-1;i>=0;i--){
    const b=bursts[i]; b.life--;
    b.mesh.position.x+=b.vx; b.mesh.position.y+=b.vy; b.mesh.position.z+=b.vz; b.vy-=.008;
    b.mesh.material.opacity=b.life/28; b.mesh.material.transparent=true;
    if(b.life<=0){ scene.remove(b.mesh); bursts.splice(i,1); }
  }
  for(let i=markers.length-1;i>=0;i--){
    const mk=markers[i]; mk.life--;
    mk.mesh.scale.setScalar(1+(30-mk.life)*.06); mk.mesh.material.opacity=mk.life/30;
    if(mk.life<=0){ scene.remove(mk.mesh); markers.splice(i,1); }
  }

  updateCamera();
  if(pbubT>0)pbubT--;
  placeBubble(pbub,pbubT,player.group,2.6);
  for(const r of Object.values(remotes)){
    if(r.bubbleT>0)r.bubbleT--;
    placeBubble(r.bubbleEl,r.bubbleT,r.group,2.6);
  }
  renderer.render(scene,camera);
}
loop();
</script>
